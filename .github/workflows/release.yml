name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v (for example 0.3.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: 386
            archive_ext: tar.gz
            archive_suffix: linux_386
          - goos: linux
            goarch: amd64
            archive_ext: tar.gz
            archive_suffix: linux_amd64
          - goos: linux
            goarch: arm
            goarm: "6"
            archive_ext: tar.gz
            archive_suffix: linux_armv6
          - goos: linux
            goarch: arm
            goarm: "7"
            archive_ext: tar.gz
            archive_suffix: linux_armv7
          - goos: linux
            goarch: arm64
            archive_ext: tar.gz
            archive_suffix: linux_arm64
          - goos: linux
            goarch: ppc64le
            archive_ext: tar.gz
            archive_suffix: linux_ppc64le
          - goos: linux
            goarch: riscv64
            archive_ext: tar.gz
            archive_suffix: linux_riscv64
          - goos: linux
            goarch: s390x
            archive_ext: tar.gz
            archive_suffix: linux_s390x
          - goos: darwin
            goarch: amd64
            archive_ext: tar.gz
            archive_suffix: darwin_amd64
          - goos: darwin
            goarch: arm64
            archive_ext: tar.gz
            archive_suffix: darwin_arm64
          - goos: windows
            goarch: 386
            archive_ext: zip
            archive_suffix: windows_386
          - goos: windows
            goarch: amd64
            archive_ext: zip
            archive_suffix: windows_amd64
          - goos: windows
            goarch: arm64
            archive_ext: zip
            archive_suffix: windows_arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          BIN_NAME="coai"
          OUTPUT_NAME="$BIN_NAME"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            OUTPUT_NAME="${BIN_NAME}.exe"
          fi
          export GOOS="${{ matrix.goos }}"
          export GOARCH="${{ matrix.goarch }}"
          if [ -n "${{ matrix.goarm || '' }}" ]; then
            export GOARM="${{ matrix.goarm }}"
          fi
          go build -o "dist/${OUTPUT_NAME}" ./cmd/coai

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          BIN_NAME="coai"
          ARCHIVE_BASE="${BIN_NAME}_${VERSION}_${{ matrix.archive_suffix }}"
          mkdir -p release
          if [ "${{ matrix.goos }}" = "windows" ]; then
            cd dist
            zip -q "../release/${ARCHIVE_BASE}.zip" "${BIN_NAME}.exe"
          else
            tar -C dist -czf "release/${ARCHIVE_BASE}.tar.gz" "${BIN_NAME}"
          fi

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.archive_suffix }}
          path: release/*

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download packaged artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          pattern: release-*
          merge-multiple: true

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"
          TITLE="coai ${VERSION}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release-artifacts/* --clobber
          else
            gh release create "$TAG" release-artifacts/* --title "$TITLE" --notes "Release ${TITLE}"
          fi
